tests:
    -
      name: blackbody50
      commands:
        - HERE/../spider -options_file HERE/opts/blackbody50.opts
        - HERE/json_timestep_to_txt.py output/1200.json
      expected: expected_output/expected_blackbody50.txt
      comparison: 1200.txt
      type: float_lines
      rules:
        -
          key: val:
          rtol: 1e-5
          atol: 1e-5
        -
          key: scaling:
          rtol: 1e-5
          atol: 1e-5
    -
      name: plot_test
      commands:
        - HERE/../spider -options_file HERE/opts/blackbody50.opts -nstepsmacro 2
        - HERE/../py/plot_spider_lite.py
      type: exit_code
    -
      name: external_mesh_roundtrip
      commands:
        - python HERE/generate_aw_mesh.py -n 50 -radius 6371000.0 -coresize 0.55 -rhos 4078.95095544 -beta 1.1115348931000002e-07 -gravity -10.0 -o HERE/data/aw_mesh_50.dat
        - HERE/../spider -options_file HERE/opts/blackbody50.opts -MESH_SOURCE 1 -mesh_external_filename HERE/data/aw_mesh_50.dat
        - HERE/json_timestep_to_txt.py output/1200.json
      expected: expected_output/expected_blackbody50.txt
      comparison: 1200.txt
      type: float_lines
      rules:
        -
          key: val:
          rtol: 1e-5
          atol: 1e-5
        -
          key: scaling:
          rtol: 1e-5
          atol: 1e-5
    -
      name: super_earth_mesh
      commands:
        - python HERE/generate_super_earth_mesh.py -n 50 -radius 8280000.0 -coresize 0.50 -o HERE/data/super_earth_mesh_50.dat
        - HERE/../spider -options_file HERE/opts/blackbody50.opts -MESH_SOURCE 1 -mesh_external_filename HERE/data/super_earth_mesh_50.dat -radius 8280000.0 -coresize 0.50 -nstepsmacro 3
      type: exit_code
