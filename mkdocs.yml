site_name: SPIDER
site_url: https://proteus-framework.org/SPIDER/
repo_url: https://github.com/FormingWorlds/SPIDER
repo_name: GitHub

nav:
  - Home: 
    - About: index.md

  - How-to guides:
      - Installation: How-to/installation.md

  - Explanations:
      - Model overview: Explanations/model.md

  - Reference:
      - Publications: Reference/publications.md

  - Community:
      - Code of Conduct: Community/CODE_OF_CONDUCT.md
      - Contact: Community/contact.md
      - Developers: https://proteus-framework.org/people
      - Issues: https://github.com/FormingWorlds/SPIDER/issues
      
  - Source code: https://github.com/FormingWorlds/SPIDER

  - Other PROTEUS modules:
      - PROTEUS submodules: proteus_framework.md
      - 🔗 PROTEUS:  https://proteus-framework.org/PROTEUS/
      - 🔗 MORS:  https://proteus-framework.org/MORS/
      - 🔗 JANUS: https://proteus-framework.org/JANUS/
      - 🔗 ZEPHYRUS: https://proteus-framework.org/ZEPHYRUS/
      - 🔗 CALLIOPE: https://proteus-framework.org/CALLIOPE/
      - 🔗 AGNI: https://www.h-nicholls.space/AGNI/
      - 🔗 Obliqua: https://proteus-framework.org/Obliqua/
      - 🔗 VULCAN: https://proteus-framework.org/VULCAN/
      - 🔗 Zalmoxis: https://proteus-framework.org/Zalmoxis/
      - 🔗 Aragog: https://proteus-framework.org/aragog/
      - 🔗 Atmodeller: https://atmodeller.readthedocs.io/en/latest/
      - 🔗 FastChem: https://newstrangeworlds.github.io/FastChem/
      - 🔗 PLATON: https://platon.readthedocs.io/en/latest/
      - 🔗 SOCRATES: https://github.com/FormingWorlds/SOCRATES/

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - content.code.copy
    - content.tabs.link

  # Default assets (used unless overridden per palette below)
  favicon: assets/PROTEUS_black_on_white_logo_only.png
  logo: assets/PROTEUS_white_on_black.png

  palette:
    # Auto: follow system preference (and show a toggle)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      favicon: assets/PROTEUS_black_on_white_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: lucide/moon
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      favicon: assets/PROTEUS_white_on_black_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: lucide/sun
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
  - stylesheets/footnotes.css
 
markdown_extensions:
  - admonition
  - attr_list
  - markdown_include.include:
      base_path: docs
  - pymdownx.extra
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes

extra_javascript:
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/header-links.js

plugins:
- search
- tags
- bibtex:
      bib_file: "docs/refs.bib"

- mkdocstrings:
    # https://mkdocstrings.github.io/usage/
    handlers:
      python:
        paths: [src]
        inventories:
        - https://installer.readthedocs.io/en/stable/objects.inv
        - https://docs.python.org/3/objects.inv
        - https://numpy.org/doc/stable/objects.inv
        - https://docs.scipy.org/doc/scipy/objects.inv
        - https://pandas.pydata.org/docs/objects.inv
        - https://matplotlib.org/stable/objects.inv
        options:
          docstring_style: numpy
          docstring_options:
            ignore_init_summary: yes
          show_submodules: no
          show_source: true
          show_symbol_type_heading: True
          show_root_heading: true
          show_root_toc_entry: true
          show_docstring_attributes: true
          show_root_full_path: false
          docstring_section_style: list
          members_order: alphabetical
          merge_init_into_class: yes
          filters: ["!^_"]

use_directory_urls: false

watch:
  - docs/
  - README.md
