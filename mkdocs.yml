theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - content.code.copy
    - content.tabs.link

  # Default assets (used unless overridden per palette below)
  favicon: assets/PROTEUS_black_on_white_logo_only.png
  logo: assets/PROTEUS_white_on_black.png

  palette:
    # Auto: follow system preference (and show a toggle)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      favicon: assets/PROTEUS_black_on_white_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: lucide/moon
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      favicon: assets/PROTEUS_white_on_black_logo_only.png
      logo: assets/PROTEUS_white_on_black.png
      toggle:
        icon: lucide/sun
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
  - stylesheets/footnotes.css
 
markdown_extensions:
  - admonition
  - attr_list
  - markdown_include.include:
      base_path: docs
  - pymdownx.extra
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes

extra_javascript:
  - javascripts/header-links.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# footer:
extra:
  generator: false
  social:
    - icon: material/web
      link: https://proteus-framework.org/
      name: PROTEUS website
    - icon: material/email
      link: mailto:proteus_dev@formingworlds.space
      name: Mail PROTEUS developers
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fwl-proteus/
      name: PROTEUS on PyPI
    - icon: fontawesome/brands/github
      link: https://github.com/FormingWorlds/PROTEUS
      name: PROTEUS on GitHub
      
plugins:
- search
- tags
- bibtex:
      bib_file: "docs/refs.bib"

- mkdocstrings:
    # https://mkdocstrings.github.io/usage/
    handlers:
      python:
        paths: [src]
        inventories:
        - https://installer.readthedocs.io/en/stable/objects.inv
        - https://docs.python.org/3/objects.inv
        - https://numpy.org/doc/stable/objects.inv
        - https://docs.scipy.org/doc/scipy/objects.inv
        - https://pandas.pydata.org/docs/objects.inv
        - https://matplotlib.org/stable/objects.inv
        options:
          docstring_style: numpy
          docstring_options:
            ignore_init_summary: yes
          show_submodules: no
          show_source: true
          show_symbol_type_heading: True
          show_root_heading: true
          show_root_toc_entry: true
          show_docstring_attributes: true
          show_root_full_path: false
          docstring_section_style: list
          members_order: alphabetical
          merge_init_into_class: yes
          filters: ["!^_"]

use_directory_urls: false

watch:
  - docs/
  - README.md
